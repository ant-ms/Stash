<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Configure Server URL</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #1e1e1e;
      color: #fff;
    }
    .container {
      background: #2a2a2a;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      text-align: center;
    }
    input[type="text"] {
      padding: 0.5rem;
      font-size: 1rem;
      width: 300px;
      margin-bottom: 1rem;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #fff;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #error {
      color: #ff6b6b;
      margin-bottom: 1rem;
      min-height: 1.5em;
      max-width: 400px;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Connect to Server</h2>
    <div id="error"></div>
    <form id="configForm">
      <input type="text" id="urlInput" placeholder="http://stash.local.lan" required />
      <br />
      <button type="submit">Connect</button>
    </form>
  </div>
  <script>
    window.electronAPI.onError((_event, value) => {
      document.getElementById('error').innerText = value;
    });

    document.getElementById('configForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const url = document.getElementById('urlInput').value;
      window.electronAPI.saveUrl(url);
    });
  </script>
</body>
</html>
