version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm_and_yarn:
        patterns:
          - "*"
    ignore:
      # pnpm@10 / lockfile v9 compatibility issues with Dependabot
      - dependency-name: "electron"
      - dependency-name: "vite"
      - dependency-name: "@sveltejs/kit"
      - dependency-name: "postcss"
